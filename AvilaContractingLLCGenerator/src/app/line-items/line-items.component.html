<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Line Items</mat-card-title>
  </mat-card-header>
  <mat-card-content>

    <div *ngFor="let section of sections; let sIdx = index" class="room-section">

      <!-- Room / Area name -->
      <div class="room-header-row">
        <mat-form-field appearance="outline" class="room-name-field">
          <mat-label>Room / Area</mat-label>
          <input
            matInput
            [(ngModel)]="section.name"
            placeholder="e.g. Master Bath, Tub Bath..."
          />
        </mat-form-field>
        <button
          mat-icon-button
          color="warn"
          (click)="removeSection(sIdx)"
          [disabled]="sections.length === 1"
          title="Remove this section"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>

      <!-- Line items table -->
      <div class="table-wrapper">
        <table class="line-items-table">
          <thead>
            <tr>
              <th class="col-desc">Description</th>
              <th class="col-sqft">Sq Ft</th>
              <th class="col-amount">Total Amount</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of section.items; let iIdx = index">
              <td class="col-desc">
                <mat-form-field appearance="outline" class="cell-field">
                  <input
                    matInput
                    [(ngModel)]="item.description"
                    placeholder="Wall, Floor, Niche..."
                  />
                </mat-form-field>
              </td>
              <td class="col-sqft">
                <mat-form-field appearance="outline" class="cell-field">
                  <input
                    matInput
                    type="number"
                    min="0"
                    [(ngModel)]="item.sqFt"
                    placeholder="0"
                  />
                </mat-form-field>
              </td>
              <td class="col-amount">
                <mat-form-field appearance="outline" class="cell-field">
                  <span matTextPrefix>$&nbsp;</span>
                  <input
                    matInput
                    type="number"
                    min="0"
                    step="0.01"
                    [(ngModel)]="item.totalAmount"
                    placeholder="0.00"
                  />
                </mat-form-field>
              </td>
              <td class="col-action">
                <button
                  mat-icon-button
                  color="warn"
                  (click)="removeItem(sIdx, iIdx)"
                  [disabled]="section.items.length === 1"
                  title="Remove row"
                >
                  <mat-icon>remove_circle_outline</mat-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <button
        mat-stroked-button
        color="primary"
        (click)="addItem(sIdx)"
        class="add-row-btn"
      >
        <mat-icon>add</mat-icon> Add Row
      </button>

      <mat-divider
        *ngIf="sIdx < sections.length - 1"
        class="section-divider"
      ></mat-divider>
    </div>

    <div class="add-section-row">
      <button mat-stroked-button (click)="addSection()">
        <mat-icon>add_circle_outline</mat-icon> Add Room / Area
      </button>
    </div>

  </mat-card-content>
</mat-card>
