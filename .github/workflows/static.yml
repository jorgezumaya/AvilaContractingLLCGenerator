name: CI / Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── CI ─────────────────────────────────────────────────────────────────────
  # Runs on every push and pull-request to main.
  # Deploy is blocked until this job passes.
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AvilaContractingLLCGenerator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AvilaContractingLLCGenerator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      # Uncomment once Angular ESLint is configured:
      #   ng add @angular-eslint/schematics
      # - name: Lint
      #   run: npm run lint

  # ── Deploy ─────────────────────────────────────────────────────────────────
  # Only runs on push to main (not PRs), and only if CI passes.
  deploy:
    name: Deploy to GitHub Pages
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AvilaContractingLLCGenerator/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: AvilaContractingLLCGenerator
        run: npm ci

      - name: Build Angular app
        working-directory: AvilaContractingLLCGenerator
        run: npm run build -- --base-href=/AvilaContractingLLCGenerator/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'AvilaContractingLLCGenerator/dist/AvilaContractingLLCGenerator/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
